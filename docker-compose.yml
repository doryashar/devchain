services:
  devchain:
    build:
      context: .
      dockerfile: apps/local-app/Dockerfile
    image: devchain:latest
    container_name: devchain
    ports:
      - "3001:3000"
    volumes:
      - devchain-data:/home/node/.devchain
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.codex:${HOME}/.codex
      - ${HOME}/.gemini:${HOME}/.gemini
      - ${HOME}/.opencode:${HOME}/.opencode
      - ${HOME}/projects:${HOME}/projects:cached
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - TEMPLATES_DIR=/app/apps/local-app/dist/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  devchain-data:
    driver: local
